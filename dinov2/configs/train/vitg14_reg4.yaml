dino:
  head_n_prototypes: 131072
  head_bottleneck_dim: 384
  do_kde: True
  kde_loss_weight: .05
  koleo_loss_weight: 0
  do_koleo: False
ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5 
  mask_ratio_min_max:
    - 0.1 
    - 0.45 
  separate_head: true
  head_n_prototypes: 131072 
train:
  sample_list_path: /block/TCGA/sample_dataset_30.txt # gives paths to svs files for data loading if streaming_from_hf=False
  streaming_from_hf: false # if True, dataset is streamed from HuggingFace Hub, and sample_list_path is ignored. You should lower num_workers to 4
  streaming_dataset_path: medarc/TCGA-12K-parquet
  batch_size_per_gpu: 48
  centering: sinkhorn_knopp
  use_pretrained: True
  OFFICIAL_EPOCH_LENGTH: 1250
  num_workers: 24 # set to 4 if streaming_from_hf=True
  prefetch_factor: 8
  skip_checkpointer: true # set True if you don't need to resume training (this yields training speedup and less space usage)
student:
  arch: vit_giant2
  patch_size: 14
  drop_path_rate: 0.4
  ffn_layer: swiglufused
  block_chunks: 4
  num_register_tokens: 4
  interpolate_antialias: true # RSG - added these from Paul's update
  interpolate_offset: 0.0 
teacher:
  momentum_teacher: 0.994
optim:
  epochs: 110 # 8000 with early_stop=200 was used for blog post ckpt
  early_stop: 110 # RSG - changed epochs and early_stop from 200 
  weight_decay_end: 0.2
  base_lr: 3.0e-04  # learning rate for a batch size of 1024 (swapped from 3.5e-4 to 2.0e-4) # RSG changed from 2.0e-04
  warmup_epochs: 10
  layerwise_decay: 1.0
crops:
  # --------------------------------------------------------
  # "baseline"           : Only RandomResizedCrop + Horizontal Flip (DINOv2 Defaults)
  # "vflip"              : Baseline + Vertical Flip
  # "rotate90"           : Baseline + 90-degree Rotations
  # "ect"                : Baseline + Random Resized Crop with ratio (1.0, 1.0)
  # "colorjitter_weak"   : Baseline + Subtle Color Shifts
  # "colorjitter_strong" : Baseline + Aggressive Color Shifts
  # "blur_weak"          : Baseline + Subtle Out-of-focus
  # "blur_strong"        : Baseline + Heavy Scanner Blur
  # "hed_weak"           : Baseline + Subtle HED Stain shift (0.03)
  # "hed_medium"         : Baseline + Standard HED Stain shift (0.08)
  # "hed_strong"         : Baseline + Aggressive HED Stain shift (0.15)
  # "randstain_weak"     : Baseline + RandStainNA Normalization (-0.5)
  # "randstain_medium"   : Baseline + RandStainNA Standard (-0.3)
  # "randstain_strong"   : Baseline + RandStainNA High Diversity (0.0)
  # "randstain_hed_combo": Baseline + Both HED and RandStain
  # "elastic"            : Baseline + Tissue Stretching
  # "jpeg"               : Baseline + JPEG Artifacts
  # "combo"              : FULL PIPELINE
  # ------------------------------
  ablation_mode: "rotate90" # RSG - modify for aug type ablation
  local_crops_size: 98
evaluation:
  eval_period_iterations: 2500 # save checkpoint every 10 epochs # RSG - changed from 5000
  bach_root: /block/eva-data/bach
  breakhis_root: /block/eva-data/breakhis
  pcam_root: /block/eva-data/patch_camelyon
